services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: practicum-app
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      NODE_ENV: production
    ports:
      - "5173:4173"
    depends_on:
      keycloak:
        condition: service_started

  postgres:
    image: postgres:16
    container_name: practicum-keycloak-db
    restart: unless-stopped
    env_file:
      - keycloak-server/.env
    environment:
      POSTGRES_DB: ${KC_DB_NAME:-keycloak}
      POSTGRES_USER: ${KC_DB_USERNAME:-keycloak}
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD:-change-me-db-password}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KC_DB_USERNAME:-keycloak} -d ${KC_DB_NAME:-keycloak}"]
      interval: 10s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: practicum-keycloak
    restart: unless-stopped
    command:
      - start-dev
      - --import-realm
      - --spi-theme--cache-themes=false
      - --spi-theme--cache-templates=false
      - --spi-theme--static-max-age=-1
    env_file:
      - keycloak-server/.env
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_PORT: 5432
      KC_DB_URL_DATABASE: ${KC_DB_NAME:-keycloak}
      KC_DB_USERNAME: ${KC_DB_USERNAME:-keycloak}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:-change-me-db-password}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-change-me-admin-password}
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./keycloak-server/realm:/opt/keycloak/data/import
      - ./keycloak-server/themes:/opt/keycloak/themes

volumes:
  postgres_data:
